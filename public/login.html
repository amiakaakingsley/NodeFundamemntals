<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fbfcfd, #ebebeb);
        }

        .container {
            border: 1px solid #789ddd;
            padding: 40px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .container h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }

        .input-group input:focus {
            outline: none;
            
        }

        button {
            width: 100%;
            padding: 10px;
            border: 1px solid #2a5298;
            background: white;
            color: #2a5298;
            ;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #1e3c72;
            color: wheat;
        }

        .extra {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
        }

        .extra a {
            text-decoration: none;
            color: #2a5298;
        }

        .extra a:hover {
            text-decoration: underline;
        }

        .results {
         display: flex ;
         margin: 5px;  
         background-color: white; 


        }   
        .results p {
           font-size: 12px; 
           color: #0c0909; 

        }   
    </style>
</head>

<body>

    <div class="container">

        <h2>Login</h2>

        <form id="loginForm">
                <div class="form_alart"> </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" name="userEmail" placeholder="Enter your email" class="userEmail" autocomplete="false" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" class="userPassword" name="userPassword" placeholder="Enter your password" autocomplete="false" required>
            </div>

            <button class="login" type="submit">Login</button>

            <div class="extra">
                <p>Forgot password? <a href="#">Reset</a></p>
                <p>Don't have an account? <a href="#">Register</a></p>
            </div>
           


        </form>

    </div>
    <div class="results">
        
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script>

        const result = document.querySelector('.results');
        const people = async () => {
            try {
                const { data } = await axios.get('/api/people');
                const peopleList = data.data
                    .map((person) => {
                        return `<p class="results">${person.name}</p>`
                    })
                result.innerHTML = peopleList.join('');

            } catch (error) {
                console.error('Error fetching people:', error);
            }
        };

        people();

    const btn = document.querySelector('.login');
    const inputName = document.querySelector('.userEmail');
    const inputPassword = document.querySelector('.userPassword');


    btn.addEventListener('click', async (e) => {
        e.preventDefault();
        const name = inputName.value;
        const password = inputPassword.value;
        console.log(name, password + "from the javascript file");
        const formAlert = document.querySelector('.form_alart')

        if(!name || !password){
            formAlert.textContent = "Please provide credentials";
            return;
        }
        try {
            const { data } = await axios.post('/api/people', {name: name, password: password});
            people();
            formAlert.textContent = `Welcome ${data.people}`;

        } catch (error) {
           console.log(error.response.data.message);
        }
        inputName.value =  "";
        inputPassword.value = "";
    })


    </script>
</body>

</html>
