<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Management</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f4f6fb;
display:flex;
flex-direction:column;
align-items:center;
padding:40px;
}

/* Home link */

a{
text-decoration:none;
color:white;
background:#4a6cf7;
padding:8px 16px;
border-radius:6px;
margin-bottom:25px;
font-size:14px;
}

a:hover{
background:#3654d4;
}

/* Form Card */

.form{
background:white;
padding:30px;
width:350px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-bottom:40px;
}

.form h2{
text-align:center;
margin-bottom:20px;
color:#333;
}

/* Inputs */

input[type="text"],
input[type="number"]{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

input:focus{
outline:none;
border-color:#4a6cf7;
}

/* Submit Button */

.submit{
width:100%;
margin-top:15px;
padding:10px;
border:none;
background:#4a6cf7;
color:white;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.submit:hover{
background:#3654d4;
}

/* Delete Section */

.delete-section{
background:white;
padding:20px;
width:350px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.delete-section input[type="text"]{
margin-bottom:10px;
}

.deleteButton{
width:100%;
padding:10px;
border:none;
background:#ff4d4d;
color:white;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.deleteButton:hover{
background:#e03a3a;
}

/* Alert text */

.formAlert{
margin-top:10px;
text-align:center;
color:green;
}

/* Result text */

.displayResult{
margin-top:10px;
text-align:center;
color:#333;
}

</style>

</head>

<body>

<a href="/">Home</a>

<form class="form">
<h2>Update a Person by ID</h2>

<input type="number" class="userID" name="userID" placeholder="Enter user ID">

<input type="text" class="name" name="name" placeholder="Enter new name">

<input class="submit" type="button" value="Update User">

<h5 class="formAlert"></h5>

</form>

<div class="delete-section">

<input type="text" class="deleteName" name="deleteName" placeholder="Enter name to delete">

<input type="button" value="Delete User" class="deleteButton">

<p class="displayResult"></p>

</div>


 <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script>
        const deleteName = document.querySelector(".deleteName");
        const deleteButton = document.querySelector('.deleteButton');
        const displayResult = document.querySelector('.displayResult');

        deleteButton.addEventListener("click", async (e) => {
            e.preventDefault();
            const name = deleteName.value;

            if(!name){
                displayResult.textContent = "You day mad? Put a Name before you submit there"
                setTimeout(() => {
                    displayResult.textContent = "";
                }, 5000)
                return ;    
            }
            try {
            await axios.delete(`/api/delete/${name}`);

             displayResult.textContent = `User ${name} deleted successfully`;

            } catch (error) {
            console.error(error);    
            }
        })

    </script>

    


    <script>
        const btn = document.querySelector('.submit');
        const userId = document.querySelector('.userID')
        const userInput = document.querySelector('.name');
        const formAlert = document.querySelector('.formAlert')


        btn.addEventListener("click", async(e) => {
            e.preventDefault();
            const name = userInput.value;
            const userId2 = userId.value;

            
        if(!name || !userId2){
            formAlert.textContent = "please provide a name and the user Id";
            return;
        }
            try {
                const {person} = await axios.put(`/api/people/${userId2}`, {name : name, id :  userId2}); 
                userInput.value = "";
                userId.value = "";
            } catch (error) {
                console.log(error);
                
            }
        })

        
    </script>
</body>
</html>
