<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fbfcfd, #ebebeb);
        }

        .container {
            border: 1px solid #789ddd;
            padding: 40px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .container h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }

        .input-group input:focus {
            outline: none;
            
        }

        button {
            width: 100%;
            padding: 10px;
            border: 1px solid #2a5298;
            background: white;
            color: #2a5298;
            ;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #1e3c72;
            color: wheat;
        }

        .extra {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
        }

        .extra a {
            text-decoration: none;
            color: #2a5298;
        }

        .extra a:hover {
            text-decoration: underline;
        }

        .results {
         display: flex ;
         margin: 5px;  
         background-color: white; 


        }   
        .results p {
           font-size: 12px; 
           color: #0c0909; 

        }   
    </style>
</head>

<body>

    <div class="container">

        <h2>Add User</h2>

        <form id="loginForm">
                <div class="form_alart"> </div>
            <div class="input-group">
                <label>Name</label>
                <input type="text" name="userName" placeholder="Enter your name" class="userName" autocomplete="false" required>
            </div>

            <div class="input-group">
                <label>Role</label>
                <input type="text" class="userRole" name="userRole" placeholder="Enter your role" autocomplete="false" required>
            </div>

            <button class="login" type="submit">Add</button>

            <div class="extra">
        <p>See List of Users <a href="/peoplePage">Users</a></p>
            </div>
        </form>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script>
    const btn = document.querySelector('.login');
    const inputName = document.querySelector('.userName');
    const inputRole = document.querySelector('.userRole');


    btn.addEventListener('click', async (e) => {
        e.preventDefault();
        const name = inputName.value;
        const role = inputRole.value;
     
        const formAlert = document.querySelector('.form_alart')

        if(!name || !role){
            formAlert.textContent = "Please provide credentials";
            return;
        }
        try {
            const { data } = await axios.post('/api/people', {name: name, role: role});
            formAlert.textContent = `Welcome ${data.person.name}`;

        } catch (error) {
           console.log(error.response.data.message);
        }
        inputName.value =  "";
        inputRole.value = "";


    })


    </script>
</body>

</html>
