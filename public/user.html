<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Directory</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f4f6fb;
            padding: 40px;
        }

        /* Container */

        .container {
            max-width: 1000px;
            margin: auto;
        }

        /* Header */

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        /* Search */

        .search-box {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
        }

        .search-box input {
            width: 300px;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px 0 0 6px;
            outline: none;
            font-size: 14px;
        }

        .search-box button {
            padding: 12px 20px;
            border: none;
            background: #4a6cf7;
            color: white;
            border-radius: 0 6px 6px 0;
            cursor: pointer;
            font-weight: bold;
        }

        .search-box button:hover {
            background: #3654d4;
        }

        /* User Grid */

        .users {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        /* User Card */

        .user-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            transition: 0.2s;
        }

        .user-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.12);
        }

        .user-card h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .role {
            color: #4a6cf7;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .stack {
            font-size: 14px;
            color: #555;
        }

        button{
            margin: 3px;
            border-radius: 10px;
            padding: 7px;
            color: wheat;

        }

      .delete {
            background-color: rgb(222, 35, 35);
        }
        .update{
            background-color: rgb(54, 113, 54);
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>User Directory</h1>

        <div class="search-box">
            <input type="text" placeholder="Search user by name...">
            <button>Search</button>
        </div>

        <div class="users">

            <div class="user-card">
                <h3 class="displaName"> </h3>
                <p class="role"> </p>
                <p class="stack">Java, JavaScript, React, Node.js, Spring Boot</p>
            </div>

            
           

        </div>

    </div>

     <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script>
        const displayUser = document.querySelector('.users');

        const showUser = async () => {
            try {
                const {data} = await axios.get('/api/people');
                const peopleList = data.data.map((persons) => {
                    return `
            <div class="user-card">
                <div>
                <h3 class="displaName"> ${persons.name} </h3>
                <p class="role"> ${persons.role} </p>
                <p class="stack">Java, JavaScript, React, Node.js, Spring Boot</p>
                </div>
              
                     <button class="delete" >Delete</button>
                     <button class="update">Update</button>
                
            </div>
        `
                }) 
        displayUser.innerHTML = peopleList.join('');

            } catch (error) {
                console.error('Error fetching people:', error);
            }
        };

        showUser();
    </script>

</body>

</html>
